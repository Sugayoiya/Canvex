<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Obsidian Lens - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#00d1ff",
                "on-primary": "#000000",
                "surface": "#0a0a0a",
                "on-surface": "#ffffff",
                "surface-container": "#1a1a1a",
                "surface-container-low": "#121212",
                "outline-variant": "rgba(255,255,255,0.1)",
                "on-surface-variant": "#a1a1aa"
              },
              fontFamily: {
                "headline": ["Space Grotesk"],
                "body": ["Manrope"],
                "label": ["Manrope"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .cinematic-overlay {
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
        }
        .login-card-glow {
            box-shadow: 0 0 40px -10px rgba(0, 209, 255, 0.15);
        }
        .primary-button-glow {
            box-shadow: 0 4px 20px -2px rgba(0, 209, 255, 0.5);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Imagery -->
<div class="fixed inset-0 -z-20">
<img alt="Cinematic Studio Background" class="w-full h-full object-cover grayscale brightness-[0.2]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcBg4cZ42_zKeqEopdeQE7bDdqiWkAY1pXIgd7YJEJQxfeKLuK6tu7Z1RKn39lFyn2Wt3dB_77Mh6Wwjk0vVJn3Ad6OI2-eCzm7tP1beRzTWcZ_NoGRRAfwHWcGXn-0DG9x_eviGIz1CIPoAaN1T1nBJRR9qf8bm5Wblc0nLHp9fWRONviXw1ylpHG_CJhg5iOwA26FdD5wqW247CC3wOrT6EGtKUp7hEN1TPmfVCJFpJERYfcNCAqt3mfcS5XkSEobmsSHp3kZ2RP"/>
</div>
<div class="fixed inset-0 -z-10 cinematic-overlay"></div>
<main class="flex-grow flex items-center justify-center p-6">
<!-- Auth Card -->
<div class="w-full max-w-[440px] bg-[#121212]/80 backdrop-blur-2xl p-10 rounded-2xl border border-white/5 login-card-glow transition-all duration-500 hover:border-white/10">
<!-- Logo Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">lens_blur</span>
</div>
<h1 class="font-headline text-3xl font-bold tracking-tight text-white mb-2">
                    Obsidian Lens
                </h1>
<p class="font-label text-[10px] uppercase tracking-[0.25em] text-on-surface-variant/80 font-medium">Cinematic Production Suite</p>
</div>
<!-- Social Auth Buttons -->
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-white/5 hover:bg-white/10 border border-white/5 rounded-lg transition-all duration-300 group">
<img alt="Google" class="w-4 h-4" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuZ2-EBRgOFmlKikEL7bXy2XUXtBKIJJVLYhtXrIOml-Ct-ePZFaWRA_d7lzsgoyc93n8CRO-l9rwWq5KhNv0WP52UOTZJVYgD4vz3IiRvMo5bvrY1tYRTU3GzSwD5_FE1ho4taAHGATVciSKc2ewgwfEHmCgcJPWUudbS2_zx1WI3YeCqXQBXEe87o893cyiKV-h5nRfZQ1xpozYRYbsp6UDQgaavPAAIlhchd5YwH6_HKUJt9Vgc_P3lGbQ_7ezMSG73lekdU70U"/>
<span class="font-body text-sm font-medium text-white/90">Continue with Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-white/5 hover:bg-white/10 border border-white/5 rounded-lg transition-all duration-300 group">
<svg class="w-4 h-4 fill-white/90" viewbox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path></svg>
<span class="font-body text-sm font-medium text-white/90">Continue with GitHub</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="flex-grow h-[1px] bg-white/5"></div>
<span class="font-label text-[10px] text-on-surface-variant/60 tracking-widest uppercase">Or email</span>
<div class="flex-grow h-[1px] bg-white/5"></div>
</div>
<!-- Email Login Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold ml-1" for="email">Email Address</label>
<input class="w-full bg-[#1c1c1c] border border-white/5 rounded-lg py-3.5 px-4 text-sm font-body text-white placeholder:text-white/20 focus:ring-1 focus:ring-primary/40 focus:border-primary/40 transition-all outline-none" id="email" placeholder="name@studio.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold" for="password">Password</label>
<a class="font-label text-[9px] uppercase tracking-widest text-primary hover:text-white transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-[#1c1c1c] border border-white/5 rounded-lg py-3.5 px-4 text-sm font-body text-white placeholder:text-white/20 focus:ring-1 focus:ring-primary/40 focus:border-primary/40 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-headline font-bold text-sm tracking-wide rounded-lg hover:brightness-110 active:scale-[0.98] transition-all primary-button-glow" type="submit">
                    Access Studio
                </button>
</form>
<!-- Bottom Action -->
<p class="text-center mt-10 font-body text-xs text-on-surface-variant">
                New to Obsidian? <a class="text-primary font-medium hover:underline hover:text-white transition-colors ml-1" href="#">Request early access</a>
</p>
</div>
</main>
<!-- Footer -->
<footer class="p-8 text-center">
<div class="flex items-center justify-center gap-2 opacity-30 hover:opacity-60 transition-opacity">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-label text-[9px] uppercase tracking-[0.2em] text-on-surface-variant">Protected by AuthGuard v2.4</span>
</div>
</footer>
</body></html>
