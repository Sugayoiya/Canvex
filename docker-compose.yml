services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: canvas_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  celery-worker-ai:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q ai_generation -c 4 --loglevel=info
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy

  celery-worker-media:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q media_processing -c 2 --loglevel=info
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy

  celery-worker-pipeline:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q pipeline -c 2 --loglevel=info
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy

  celery-worker-quick:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q quick -c 8 --loglevel=info
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy

  celery-flower:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: ./api/.env
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  redis_data:
  postgres_data:
