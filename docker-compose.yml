services:
  # ────────────────── Infrastructure ──────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: canvas_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ────────────────── Nginx Proxy Manager ──────────────────
  npm:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP
      - "443:443"     # HTTPS
      - "81:81"       # NPM Admin UI
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - api
      - web

  # ────────────────── Backend API ──────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./api/.env.docker
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ────────────────── Frontend ──────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    depends_on:
      - api

  # ────────────────── Celery Workers ──────────────────
  celery-worker-ai:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run celery -A app.celery_app worker -Q ai_generation -c 4 --loglevel=info
    env_file: ./api/.env.docker
    depends_on:
      redis:
        condition: service_healthy

  celery-worker-media:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run celery -A app.celery_app worker -Q media_processing -c 2 --loglevel=info
    env_file: ./api/.env.docker
    depends_on:
      redis:
        condition: service_healthy

  celery-worker-quick:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run celery -A app.celery_app worker -Q quick,pipeline -c 4 --loglevel=info
    env_file: ./api/.env.docker
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run celery -A app.celery_app beat --loglevel=info
    env_file: ./api/.env.docker
    depends_on:
      redis:
        condition: service_healthy

  celery-flower:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run celery -A app.celery_app flower --port=5555
    env_file: ./api/.env.docker
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  npm_data:
  npm_letsencrypt:
  api_uploads:
  api_logs:
