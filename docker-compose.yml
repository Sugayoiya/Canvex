name: canvex

services:
  # ────────────────── Infrastructure ──────────────────
  redis:
    image: redis:7-alpine
    container_name: canvex-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: canvex-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ────────────────── Nginx Proxy Manager ──────────────────
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: canvex-npm
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-81}:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - api
      - web

  # ────────────────── Backend API ──────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: canvex-api
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ────────────────── Frontend ──────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: canvex-web
    restart: unless-stopped
    depends_on:
      - api

  # ────────────────── Celery Workers ──────────────────
  worker-ai:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: canvex-worker-ai
    restart: unless-stopped
    command: uv run celery -A app.celery_app worker -Q ai_generation -c 4 --loglevel=info
    env_file: ./.env
    depends_on:
      redis:
        condition: service_healthy

  worker-media:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: canvex-worker-media
    restart: unless-stopped
    command: uv run celery -A app.celery_app worker -Q media_processing -c 2 --loglevel=info
    env_file: ./.env
    depends_on:
      redis:
        condition: service_healthy

  worker-quick:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: canvex-worker-quick
    restart: unless-stopped
    command: uv run celery -A app.celery_app worker -Q quick,pipeline -c 4 --loglevel=info
    env_file: ./.env
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: canvex-beat
    restart: unless-stopped
    command: uv run celery -A app.celery_app beat --loglevel=info
    env_file: ./.env
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: canvex-flower
    restart: unless-stopped
    command: uv run celery -A app.celery_app flower --port=5555
    env_file: ./.env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  npm_data:
  npm_letsencrypt:
  api_uploads:
  api_logs:
